body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯百千瑜伽中金剛大師説聖曼殊童子五字祕密法修此三昧者疾入諸佛慧能以凡夫身見成就佛身此法最祕密大師口傳授應被精進鎧依法不依人如來法無二淨信者所得猶如普注雨沃土先滋長世尊所密教智者宜修習衆生性狹劣迷入三有苦雖聞勝上法不生勇進意智者生悲愍為此求先覺猶如近寶山智人往採掇愚者知不往長日受衆苦若有聞此法即知最勝路住於大願者如是人堪學若有聞此法悚栗深悲喜涕泣身毛竪如是人堪學若有聞此法一心即不亂諸根淨適悅如是人堪學若有聞此法隨得禪悅味即不樂世樂如是人堪學若有聞此法不待時與日不求具足法唯以心直進不於諸供具作求不得苦善知法供養如是人堪學誦習真言時如味天甘露一心必願聞如是人堪學二手結祕印作大殷重想猶如捧須彌如是人堪學此法諸佛為最上乘者説根性下劣者疑惑不能信衆生性淨故諸佛本誓力以相應法印現成諸聖身即於一坐中便成最正覺若隨此法者應作如是信或起於一念言我是凡夫同謗三世佛法中結重罪未受灌頂位及非同事者不應妄稱説如護髻中珠如經説處所或於阿練若河池及海岸清淨名山峯得道轉法輪仙人成就處擇地起精舍隨順於境界塗地淨平好布散諸時花助法諸律儀如諸部所説清淨澡浴體襲上妙衣服塗香使嚴好趣於精舍門先想己身形作金剛薩埵左手持金剛右執光明磬門戶稱吽字怒目除不祥即五體投地敬禮世尊足一心以歸命作佛常住想次雙膝長跪發露諸過咎以此清淨句懇誠為懺悔唵薩嚩二合婆引嚩戌馱引薩嚩達磨引薩嚩二合婆引嚩戌度含當默誦一遍口稱阿字句無量所積罪清淨無有餘次以虔請心結金剛起印默誦此密語召集十方佛二手金剛拳相鉤檀慧度進力峯相合當心仰三招即知諸如來悉從三昧起唵嚩日𡀔二合底瑟姹二合應觀虛空中諸佛及聖衆充滿法界海間無有空缺悉以誓願力咸來降道場結持金剛印想禮諸佛足二羽各相背檀慧禪智鉤想禮諸如來長跪頂上散唵嚩日囉二合勿音微吉反坐法有四種隨事次應作端身定支節趺坐淨月輪則以麼吒字二目為日月舒放金剛焰瞻視諸如來次回顧諸方燒除作障者心舌及二羽吽字騰金光猶如諸如來説法之妙相次對十方佛結大誓願印十度金剛縛雙建忍願峯示佛及諸聖祈憶昔所願唵三麼耶薩怛鑁三合次結歡喜印獻此三昧悅十度外相叉忍願中交合檀慧與禪智各相合而竪唵三麼耶縠引素喇多薩怛鑁三合觀於二乳上右怛囉左吒如宮室戶扇誦此祕言句即以金剛嚩三掣撥令啓唵嚩日囉二合滿馱怛囉二合吒半音觀前八葉蓮阿字素光色二羽金剛縛禪智入於中誦此祕密言字流入於殿唵嚩日囉二合引吠舍惡如前入字印進力度屈拄以此闔心門智字獲堅固唵嚩日囉二合母瑟致二合𤚥次結降三世住忿怒三昧欲作此法者先住大悲心二羽金剛拳檀慧反相鉤進力度竪開住於叱唱相顰眉笑而怒四吽如雷音觀密迹等衆受教而侍立左旋成辟除右旋成結界唵遜婆儞遜婆儞吽吃哩二合恨拏二合仡哩二合恨拏二合吽仡哩二合恨拏二合播耶吽阿曩耶縠薄伽鑁嚩日囉二合吽發吒半音次結三昧印行者住三昧二羽外相叉仰於跏坐上端坐合口齒數息令心定先所請如來遍滿空界者彈指警覺我令觀阿字門默誦此密語受教而侍立唵唧多鉢囉二合底味鄧迦𡀔彌當默誦一遍便想為月輪倍欲清淨故誦此祕密言唵冒地唧多母怛跛二合那夜彌於清淨月輪觀種子淡字以成金剛劍誦此祕密語唵底瑟姹二合嚩日囉二合底乞瑟拏三合於清淨月輪鋭利至光徹次應漸周遍引量同虛空唵薩頗二合囉嚩日囉二合底引乞瑟拏三合亦不見己身及與一切相次應漸觀劍誦此收攝言唵僧賀囉嚩日囉二合底乞瑟拏三合虛空諸如來悉隨劍而斂量同己身已便成本聖形身色如紫金作妙童子相五髻被首飾冠寶五方冠右持金剛劍上發火焰色左手持青蓮有般若梵夾住諸妙色相身處淨月輪行者住此已應作是思惟我今堅固住金剛劍之身三昧耶之身摩訶三昧耶三世諸如來現成等正覺我住此三昧為金剛劍身作是思惟己同於誦密語應結本聖印加持三昧形二羽外相叉忍願俱申直屈二度上節猶如劍峯狀心額喉與頂各誦此一遍唵耨佉泚娜淡又結五髻印令具足諸相戒慧及檀方進禪力智度忍願等皆合印狀如五峯印心兩肩喉最後置頂上此名五髻印誦此本真言曩莫三曼多沒馱南阿鉢囉二合底賀多舍娑娜南怛儞也二合他唵囉囉三麼二合囉阿鉢囉二合底賀多舍娑娜南俱摩囉路跛陀哩抳吽娑頗二合吒娑頗二合吒娑嚩二合引賀引次結灌頂印雙手合其掌禪智入於中進力摩尼狀置額誦密語想佛灌我頂唵囉怛曩二合句舍阿仡哩耶三合吽次結寶鬘印前印解而分額前與頂後以印皆三繞先從壇慧開如垂鬘帶勢唵囉怛娜二合句舍阿仡哩耶三合麼隸次被堅固甲二羽金剛拳交舒進力度唵砧想指面緑色光不絶猶如抽藕絲心背臍與腰二膝與坐後漸及喉與頸次額及頂後進力皆三繞前從壇慧散二手垂天衣此名慈悲甲唵嚩日囉二合迦嚩制嚩日囉二合句嚧嚩日囉二合嚩日哩二合含次於畫像心觀淡字為劍復成本尊體如前之所觀即以鉤印請二羽金剛拳檀慧反相鉤力竪進招屈唵嚩日啷二合句舍弱次以索印入印相同於前唯以進力度相拄如環勢唵嚩日囉二合波舍吽次以鎖印止二羽金剛拳進力如鉤鎖以此能止住唵嚩日囉二合薩普二合吒𤚥次以磬印喜復以此前印檀慧進力度各各反相鉤唵嚩日囉二合健茶縠次應獻遏伽妙器滿香水并置微妙花捧至額以獻唵嚩日𡀔二合娜迦坼次結四內供遍照尊所化摩訶囉底女適悅獻諸聖二羽金剛縛禪智並而申觀妙妓女雲遍滿十方剎唵摩訶囉底次以鬘印獻伸臂捧而前觀妙寶鬘雲遍滿虛空界唵𡀔波戌鞞次結歌詠印以此而供養前印從於臍漸上至口散想緊那羅音供養諸聖衆唵輸嚧二合怛囉二合燥企曳二合次以舞供養奉獻十方聖二手金剛拳右旋頂上散想妙妓樂雲遍滿諸世界唵薩嚩補而曳二合次以焚香印普薰諸世界金剛縛下散遍法界香雲唵嚩日囉二合度閉次以散花印莊嚴諸世界金剛縛上散花網遍虛空唵嚩日囉二合補澀閉二合次獻智燈印普燎諸幽冥禪智前相逼普此智慧光唵嚩日囉二合魯計次獻塗香印當胸塗香勢以解脫香雲普淨衆生界唵嚩日囉二合巘提內外供養已次第當順念結祕根本印誦百字真言唵引朅哩誐二合薩怛嚩二合參摩耶摩弩播攞野朅哩誐二合薩怛嚩二合怛尾二合弩引跛底瑟姹二合儞哩二合住引銘婆嚩素覩引瑟諭二合銘婆嚩阿怒囉訖都二合寐婆嚩素補瑟諭二合寐婆嚩薩婆悉地弭以鉢囉二合也瑳薩嚩羯麼素者寐止多室唎二合藥句嚕二合十一吽呵呵呵呵縠引薄誐梵薩嚩怛他蘖多渴㗚誐二合麼寐悶者渴㗚霓二合引婆嚩摩訶三摩耶薩怛嚩二合惡引不解根本印便稱已念明阿囉跛者娜念法有四種一者三摩地謂觀所念明本尊口流出隨光入我口右旋布心月如以水精珠布於明鏡上阿者無生義囉無塵染義跛無第一義諸法性平等者無諸行義娜無性相義五句雖差別其性無有二心與性合者不須重分別佛所歎無思無思亦不思不思思思已乃至陀羅尼如是四句義隨順契經説二者言音念依前觀諸字離高下緩急音勢如搖鈴三者金剛念依前入字觀密合唇與齒小令舌微動四者降魔念以悲心為本外現威怒相顰眉聲亦勵四種雖差別一念為無二二手持念珠菩提與蓮子當以蓮華印或住説法印朝午昏中夜四時為定準此法最第一為祕密中最應不顧身命一心依了義順理修行人住於禪行者應當觀此法為起三昧用速獲種智故下劣根性人癡愛雜亂者亦勸修此法為消煩惱障入寂靜智故數限終竟已復獻遏伽水應以歡喜心妙音誦讚歎復陳八供養戀慕而奉獻結祕根本印從心頂上散想尊虛空中復道還本宮唵嚩日囉二合底乞瑟拏三合穆住此三昧人最尊無有上除佛及菩薩無人可愛敬欲隨順世間現於禮敬者當觀彼人首有佛菩薩相誦百字真言法中所祕密心欲有散亂應當密稱誦昔於大師前口受要如是愚力不能述如海一渧水恐違大聖者悚懼懷戰栗猶如愚下人手獻少甘露勿以輕彼故上藥為無效野干羅剎形為法故應受願以此功德普覺諸群有我得離世網隨説而修習
